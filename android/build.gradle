apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

// Load nitrogen-generated source files
apply from: '../nitrogen/generated/android/NitroSpeechRecognition+autolinking.gradle'

group = 'com.speechrecognition'
version = '0.1.0'

buildscript {
  ext.safeExtGet = { prop, fallback ->
    rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
  }
}

android {
  namespace "com.speechrecognition"
  compileSdkVersion safeExtGet("compileSdkVersion", 34)

  defaultConfig {
    minSdkVersion safeExtGet("minSdkVersion", 21)
    targetSdkVersion safeExtGet("targetSdkVersion", 34)
    versionCode 1
    versionName "0.1.0"
  }

  externalNativeBuild {
    cmake {
      path "CMakeLists.txt"
    }
  }

  lintOptions {
    abortOnError false
  }

  sourceSets {
    main {
      java.srcDirs += ['src/main/java']
    }
  }
}

repositories {
  mavenCentral()
  google()
}

dependencies {
  implementation "org.jetbrains.kotlin:kotlin-stdlib:${safeExtGet('kotlinVersion', '1.9.24')}"
  implementation "org.jetbrains.kotlinx:kotlinx-coroutines-core:1.7.3"
  implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3"
  implementation "androidx.core:core-ktx:1.12.0"

  //noinspection GradleDynamicVersion
  implementation "com.facebook.react:react-android:+"
  //noinspection GradleDynamicVersion
  implementation "com.margelo.nitro:react-native-nitro-modules:+"
}
